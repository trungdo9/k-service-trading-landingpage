<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K Service Trading — Premium FMCG · Imported Goods (Animation)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0F1412; }
    #root { position: fixed; inset: 0; }
    /* Hide playback bar when embedded as ?embed=1 */
    body.embed [data-playbar] { display: none !important; }
  </style>
</head>
<body data-screen-label="00 FMCG · 00:00">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="fmcg-animation.jsx"></script>

  <script>
    // ?embed=1 → strip playback bar so the animation reads as a clean video panel
    if (new URLSearchParams(location.search).get('embed') === '1') {
      const tag = () => {
        const all = document.querySelectorAll('div');
        all.forEach(d => {
          // Stage's playback bar has these signature inline styles
          if (d.style && d.style.maxWidth === '680px' && d.style.background && d.style.background.includes('20,20,20')) {
            d.setAttribute('data-playbar', '');
          }
        });
      };
      const obs = new MutationObserver(tag);
      obs.observe(document.body, { childList: true, subtree: true });
      document.body.classList.add('embed');
    }

    // Update timestamp in screen label once per second
    setInterval(() => {
      try {
        const t = parseFloat(localStorage.getItem('fmcg-anim:t') || '0');
        const sec = String(Math.floor(t)).padStart(2, '0');
        document.body.setAttribute('data-screen-label', `00 FMCG · 00:${sec}`);
      } catch {}
    }, 1000);
  </script>
</body>
</html>
